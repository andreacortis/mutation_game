<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Root Systems as 3D Polytopes</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; font-family: sans-serif; color: #eee; overflow: hidden; }
  #viewer { width: 100%; height: 320px; position: relative; }
  #viewer canvas { width: 100% !important; height: 100% !important; }
  #selector {
    display: flex; justify-content: center; gap: 6px;
    padding: 8px 4px; background: #16213e; flex-wrap: wrap;
  }
  .btn {
    padding: 6px 14px; border: 2px solid #444; border-radius: 20px;
    background: transparent; color: #ccc; cursor: pointer;
    font-size: 13px; transition: all 0.2s;
  }
  .btn:hover { border-color: #888; color: #fff; }
  .btn.active { border-color: #ffd700; color: #fff; background: rgba(255,255,255,0.1); }
  #info {
    text-align: center; padding: 6px; font-size: 13px;
    background: #16213e; border-top: 1px solid #333;
  }
  #info .dynkin { color: #ffd700; font-weight: bold; font-size: 15px; }
  #info .detail { color: #aaa; font-size: 12px; }
  #legend {
    text-align: center; padding: 4px; font-size: 12px;
    background: #16213e; color: #888;
  }
  #legend .pos { color: #ff6b6b; }
  #legend .neg { color: #4ecdc4; }
  #legend .simple { color: #ffd700; }
</style>
</head>
<body>
<div id="selector"></div>
<div id="viewer"></div>
<div id="info"></div>
<div id="legend">
  <span class="pos">&#9679;</span> Positive roots &nbsp;&nbsp;
  <span class="neg">&#9679;</span> Negative roots &nbsp;&nbsp;
  <span class="simple">&#9679;</span> Simple roots &nbsp;&nbsp;
  &#8212; Edges connect roots differing by a simple root
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// Minimal OrbitControls
THREE.OrbitControls = function(camera, domElement) {
  this.camera = camera; this.domElement = domElement;
  this.target = new THREE.Vector3();
  var scope = this, spherical = new THREE.Spherical(),
      sphericalDelta = new THREE.Spherical(),
      rotateStart = new THREE.Vector2(), rotateEnd = new THREE.Vector2(),
      rotateDelta = new THREE.Vector2(), isDown = false;
  function onDown(x,y){isDown=true;rotateStart.set(x,y);}
  function onUp(){isDown=false;}
  function onMove(x,y){if(!isDown)return;rotateEnd.set(x,y);rotateDelta.subVectors(rotateEnd,rotateStart);
    sphericalDelta.theta-=2*Math.PI*rotateDelta.x/domElement.clientHeight;
    sphericalDelta.phi-=2*Math.PI*rotateDelta.y/domElement.clientHeight;
    rotateStart.copy(rotateEnd);}
  domElement.addEventListener('mousedown',function(e){onDown(e.clientX,e.clientY);});
  domElement.addEventListener('mouseup',onUp);domElement.addEventListener('mouseleave',onUp);
  domElement.addEventListener('mousemove',function(e){onMove(e.clientX,e.clientY);});
  domElement.addEventListener('wheel',function(e){spherical.radius*=e.deltaY>0?1.1:0.9;e.preventDefault();},{passive:false});
  domElement.addEventListener('touchstart',function(e){if(e.touches.length===1)onDown(e.touches[0].clientX,e.touches[0].clientY);});
  domElement.addEventListener('touchend',onUp);
  domElement.addEventListener('touchmove',function(e){if(e.touches.length===1){onMove(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault();}},{passive:false});
  var offset=new THREE.Vector3();
  spherical.setFromVector3(camera.position.clone().sub(scope.target));
  this.update=function(){spherical.theta+=sphericalDelta.theta;spherical.phi+=sphericalDelta.phi;
    spherical.phi=Math.max(0.01,Math.min(Math.PI-0.01,spherical.phi));spherical.makeSafe();
    offset.setFromSpherical(spherical);camera.position.copy(scope.target).add(offset);
    camera.lookAt(scope.target);sphericalDelta.theta*=0.85;sphericalDelta.phi*=0.85;};
};

// Projection basis for R^4 -> R^3 (hyperplane sum=0)
var u1 = [1/Math.sqrt(2), -1/Math.sqrt(2), 0, 0];
var u2 = [1/Math.sqrt(6), 1/Math.sqrt(6), -2/Math.sqrt(6), 0];
var u3 = [1/Math.sqrt(12), 1/Math.sqrt(12), 1/Math.sqrt(12), -3/Math.sqrt(12)];

function dot4(a,b){return a[0]*b[0]+a[1]*b[1]+a[2]*b[2]+a[3]*b[3];}
function toR4_A(abc){
  var a=abc[0],b=abc[1],c=abc[2];
  return [a, b-a, c-b, -c]; // a*alpha1 + b*alpha2 + c*alpha3
}
function toR4_D(abcd){
  // D4 simple roots: alpha1=e1-e2, alpha2=e2-e3, alpha3=e3+e4, alpha4=e3-e4 (our numbering)
  // Actually our code uses 0-1-fork(2,3), so:
  // alpha0=e1-e2, alpha1=e2-e3, alpha2=e3-e4, alpha3=e3+e4...
  // Simpler: just project from our basis coordinates directly
  return abcd; // will handle differently
}
function projectR4(v4){return [dot4(v4,u1),dot4(v4,u2),dot4(v4,u3)];}

// Root system data — precomputed
var systems = {
  'A3': {
    name: 'A\u2083', polytope: 'Cuboctahedron',
    nPos: 6, nTotal: 12, weyl: 'S\u2084',
    toR4: function(r){ return [r[0], r[1]-r[0], r[2]-r[1], -r[2]]; },
    roots: [
      // positive
      {r:[0,0,1],pos:true,simple:true},{r:[0,1,0],pos:true,simple:true},{r:[1,0,0],pos:true,simple:true},
      {r:[0,1,1],pos:true,simple:false},{r:[1,1,0],pos:true,simple:false},{r:[1,1,1],pos:true,simple:false},
      // negative
      {r:[0,0,-1],pos:false,simple:true},{r:[0,-1,0],pos:false,simple:true},{r:[-1,0,0],pos:false,simple:true},
      {r:[0,-1,-1],pos:false,simple:false},{r:[-1,-1,0],pos:false,simple:false},{r:[-1,-1,-1],pos:false,simple:false},
    ]
  },
  'B3': {
    name: 'B\u2083', polytope: 'Cuboctahedron + Octahedron',
    nPos: 9, nTotal: 18, weyl: 'S\u2083 \u22c9 (Z/2)\u00b3',
    // B3 roots in R^3: short roots +-e_i, long roots +-e_i+-e_j
    toR4: null, // use direct 3D coords
    roots: (function(){
      var out = [];
      // short: +-e_i
      for(var i=0;i<3;i++){var v=[0,0,0];v[i]=1;out.push({r:v.slice(),pos:true,simple:i===2});
        var w=[0,0,0];w[i]=-1;out.push({r:w.slice(),pos:false,simple:i===2});}
      // long: +-e_i+-e_j (i<j)
      for(var i=0;i<3;i++)for(var j=i+1;j<3;j++)
        for(var si of[1,-1])for(var sj of[1,-1]){
          var v=[0,0,0];v[i]=si;v[j]=sj;
          var p=si>0&&sj>0;out.push({r:v,pos:p||(si>0&&sj<0&&i<j),simple:false});}
      // deduplicate and fix positivity
      var seen={},res=[];
      out.forEach(function(x){var k=x.r.join(',');if(!seen[k]){seen[k]=1;
        x.pos=x.r.find(function(v){return v!==0;})>0;res.push(x);}});
      // mark simple: e1-e2=(1,-1,0), e2-e3=(0,1,-1), e3=(0,0,1) -- but this is B3 in std coords
      return res;
    })()
  },
  'A2': {
    name: 'A\u2082', polytope: 'Hexagon',
    nPos: 3, nTotal: 6, weyl: 'S\u2083',
    toR4: null,
    roots: (function(){
      // A2 roots as 2D vectors (equilateral hexagon)
      var a = Math.PI/6;
      var out = [];
      for(var i=0;i<6;i++){
        var angle = i*Math.PI/3 + a;
        var x = Math.cos(angle), y = Math.sin(angle);
        out.push({r:[x,y,0], pos:i<3, simple:i===0||i===1||i===3||i===4});
      }
      // mark simple roots (first two positive)
      out[0].simple=true; out[1].simple=true;
      out[3].simple=true; out[4].simple=true;
      return out;
    })()
  }
};

// Precompute A3 properly
(function(){
  var s = systems['A3'];
  s.roots.forEach(function(root){
    var v4 = s.toR4(root.r);
    var p = projectR4(v4);
    root.pos3d = p;
  });
})();

// For B3 and A2, pos3d = r directly
['B3','A2'].forEach(function(k){
  systems[k].roots.forEach(function(root){ root.pos3d = root.r; });
});

// Scene
var container = document.getElementById('viewer');
var scene = new THREE.Scene();
var camera = new THREE.PerspectiveCamera(45, 2, 0.1, 100);
camera.position.set(3.5, 2.5, 3.5);
var renderer = new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x1a1a2e,1);
container.appendChild(renderer.domElement);
var controls = new THREE.OrbitControls(camera, renderer.domElement);

scene.add(new THREE.AmbientLight(0x404040, 2));
var l1=new THREE.DirectionalLight(0xffffff,0.6);l1.position.set(5,5,5);scene.add(l1);

var currentGroup = new THREE.Group();
scene.add(currentGroup);

var COL_POS = 0xff6b6b;
var COL_NEG = 0x4ecdc4;
var COL_SIMPLE_POS = 0xffd700;
var COL_SIMPLE_NEG = 0xffd700;

function showSystem(key) {
  while(currentGroup.children.length) currentGroup.remove(currentGroup.children[0]);
  var sys = systems[key];
  var roots = sys.roots;

  // Draw root vertices as spheres
  roots.forEach(function(root){
    var color = root.simple ? (root.pos ? COL_SIMPLE_POS : COL_SIMPLE_NEG) :
                              (root.pos ? COL_POS : COL_NEG);
    var radius = root.simple ? 0.09 : 0.065;
    var geo = new THREE.SphereGeometry(radius, 16, 16);
    var mat = new THREE.MeshPhongMaterial({color: color, emissive: color, emissiveIntensity: 0.3});
    var mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(root.pos3d[0], root.pos3d[1], root.pos3d[2]);
    currentGroup.add(mesh);
  });

  // Draw edges between roots that differ by a simple root
  // Two roots are connected if their difference is a root (adjacency in root system)
  var pts = roots.map(function(r){return r.pos3d;});
  var lineMat = new THREE.LineBasicMaterial({color: 0x555555, transparent: true, opacity: 0.4});
  for(var i=0;i<roots.length;i++){
    for(var j=i+1;j<roots.length;j++){
      var dx=pts[i][0]-pts[j][0], dy=pts[i][1]-pts[j][1], dz=pts[i][2]-pts[j][2];
      var dist = Math.sqrt(dx*dx+dy*dy+dz*dz);
      // For A3 cuboctahedron, adjacent vertices are at distance sqrt(2) ~ 1.414
      // For general, connect nearest neighbors
      if(dist < 1.5) {
        var geo = new THREE.BufferGeometry().setFromPoints([
          new THREE.Vector3(pts[i][0],pts[i][1],pts[i][2]),
          new THREE.Vector3(pts[j][0],pts[j][1],pts[j][2])
        ]);
        currentGroup.add(new THREE.Line(geo, lineMat));
      }
    }
  }

  // Draw transparent convex hull faces for positive roots
  var posRoots = roots.filter(function(r){return r.pos;});
  if(posRoots.length >= 3) {
    var posGeo = new THREE.BufferGeometry();
    var posPts = posRoots.map(function(r){return new THREE.Vector3(r.pos3d[0],r.pos3d[1],r.pos3d[2]);});
    var hull = new THREE.ConvexGeometry ? null : null; // ConvexGeometry not in core
    // Skip hull — edges are enough
  }

  // Origin marker
  var originGeo = new THREE.SphereGeometry(0.03, 8, 8);
  var originMat = new THREE.MeshBasicMaterial({color: 0xffffff});
  currentGroup.add(new THREE.Mesh(originGeo, originMat));

  // Axes (faint)
  var axLen = 2;
  var axMat = new THREE.LineBasicMaterial({color: 0x333355, transparent: true, opacity: 0.3});
  [[axLen,0,0],[-axLen,0,0],[0,axLen,0],[0,-axLen,0],[0,0,axLen],[0,0,-axLen]].forEach(function(p){
    var g = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(),new THREE.Vector3(p[0],p[1],p[2])]);
    currentGroup.add(new THREE.Line(g, axMat));
  });

  // Update buttons
  document.querySelectorAll('.btn').forEach(function(b){ b.classList.toggle('active', b.dataset.key===key); });

  // Update info
  document.getElementById('info').innerHTML =
    '<span class="dynkin">' + sys.name + '</span> root system &mdash; ' + sys.polytope +
    ' &nbsp; <span class="detail">' + sys.nPos + ' positive + ' + sys.nPos + ' negative = ' +
    sys.nTotal + ' roots &nbsp;|&nbsp; Weyl group: ' + sys.weyl + '</span>';
}

// Buttons
var selectorDiv = document.getElementById('selector');
Object.keys(systems).forEach(function(key){
  var btn = document.createElement('button');
  btn.className = 'btn'; btn.dataset.key = key;
  btn.textContent = systems[key].name + ' (' + systems[key].polytope + ')';
  btn.addEventListener('click', function(){ showSystem(key); });
  selectorDiv.appendChild(btn);
});

showSystem('A3');

function resize(){var w=container.clientWidth,h=container.clientHeight;
  renderer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix();}
window.addEventListener('resize',resize); resize();

function animate(){requestAnimationFrame(animate);
  currentGroup.rotation.y+=0.003;controls.update();renderer.render(scene,camera);}
animate();
</script>
</body>
</html>
