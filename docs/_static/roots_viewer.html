<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Root Systems as 3D Polytopes</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; font-family: sans-serif; color: #eee; overflow: hidden; }
  #viewer { width: 100%; height: 320px; position: relative; }
  #viewer canvas { width: 100% !important; height: 100% !important; }
  #selector {
    display: flex; justify-content: center; gap: 6px;
    padding: 8px 4px; background: #16213e; flex-wrap: wrap;
  }
  .btn {
    padding: 6px 14px; border: 2px solid #444; border-radius: 20px;
    background: transparent; color: #ccc; cursor: pointer;
    font-size: 13px; transition: all 0.2s;
  }
  .btn:hover { border-color: #888; color: #fff; }
  .btn.active { border-color: #ffd700; color: #fff; background: rgba(255,255,255,0.1); }
  #info {
    text-align: center; padding: 6px; font-size: 13px;
    background: #16213e; border-top: 1px solid #333;
  }
  #info .dynkin { color: #ffd700; font-weight: bold; font-size: 15px; }
  #info .detail { color: #aaa; font-size: 12px; }
  #legend {
    text-align: center; padding: 4px; font-size: 12px;
    background: #16213e; color: #888;
  }
  .pos-dot { color: #ff6b6b; }
  .neg-dot { color: #4ecdc4; }
  .simple-dot { color: #ffd700; }
</style>
</head>
<body>
<div id="selector"></div>
<div id="viewer"></div>
<div id="info"></div>
<div id="legend">
  <span class="pos-dot">&#9679;</span> Positive roots &nbsp;&nbsp;
  <span class="neg-dot">&#9679;</span> Negative roots &nbsp;&nbsp;
  <span class="simple-dot">&#9679;</span> Simple roots &nbsp;&nbsp;
  &#8212; Edges connect adjacent roots
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
  // Minimal OrbitControls
  THREE.OrbitControls = function(camera, el) {
    var sph = new THREE.Spherical();
    var sphD = new THREE.Spherical();
    var rs = new THREE.Vector2(), re = new THREE.Vector2(), rd = new THREE.Vector2();
    var down = false;
    sph.setFromVector3(camera.position);
    function md(x,y){down=true;rs.set(x,y);}
    function mu(){down=false;}
    function mm(x,y){if(!down)return;re.set(x,y);rd.subVectors(re,rs);
      sphD.theta-=2*Math.PI*rd.x/el.clientHeight;
      sphD.phi-=2*Math.PI*rd.y/el.clientHeight;rs.copy(re);}
    el.addEventListener('mousedown',function(e){md(e.clientX,e.clientY);});
    el.addEventListener('mouseup',mu);el.addEventListener('mouseleave',mu);
    el.addEventListener('mousemove',function(e){mm(e.clientX,e.clientY);});
    el.addEventListener('wheel',function(e){sph.radius*=e.deltaY>0?1.1:0.9;e.preventDefault();},{passive:false});
    el.addEventListener('touchstart',function(e){if(e.touches.length===1)md(e.touches[0].clientX,e.touches[0].clientY);});
    el.addEventListener('touchend',mu);
    el.addEventListener('touchmove',function(e){if(e.touches.length===1){mm(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault();}},{passive:false});
    this.update=function(){sph.theta+=sphD.theta;sph.phi+=sphD.phi;
      sph.phi=Math.max(0.01,Math.min(Math.PI-0.01,sph.phi));sph.makeSafe();
      var o=new THREE.Vector3().setFromSpherical(sph);
      camera.position.copy(o);camera.lookAt(new THREE.Vector3());
      sphD.theta*=0.85;sphD.phi*=0.85;};
  };

  // Projection from R^4 to R^3 (hyperplane sum=0)
  var sq2=Math.sqrt(2),sq6=Math.sqrt(6),sq12=Math.sqrt(12);
  var u1=[1/sq2,-1/sq2,0,0], u2=[1/sq6,1/sq6,-2/sq6,0], u3=[1/sq12,1/sq12,1/sq12,-3/sq12];
  function dot4(a,b){return a[0]*b[0]+a[1]*b[1]+a[2]*b[2]+a[3]*b[3];}
  function proj(v4){return [dot4(v4,u1),dot4(v4,u2),dot4(v4,u3)];}

  // ---- Build root systems ----

  // A2: hexagon in 2D
  function buildA2() {
    var roots = [];
    // simple roots in R^3 (projected from R^3 -> use 2D in xy plane)
    var a1 = [1, 0, 0], a2 = [-0.5, Math.sqrt(3)/2, 0];
    var combos = [[1,0],[0,1],[1,1],[-1,0],[0,-1],[-1,-1]];
    var simples = {'1,0':true, '0,1':true, '-1,0':true, '0,-1':true};
    for (var i = 0; i < combos.length; i++) {
      var c = combos[i];
      var x = c[0]*a1[0] + c[1]*a2[0];
      var y = c[0]*a1[1] + c[1]*a2[1];
      var isPos = (c[0] > 0) || (c[0] === 0 && c[1] > 0);
      var isSim = (c[0]===1&&c[1]===0)||(c[0]===0&&c[1]===1)||
                  (c[0]===-1&&c[1]===0)||(c[0]===0&&c[1]===-1);
      roots.push({p:[x,y,0], pos:isPos, simple:isSim});
    }
    return roots;
  }

  // A3: cuboctahedron (12 roots e_i - e_j in R^4, projected)
  function buildA3() {
    var roots = [];
    for (var i = 0; i < 4; i++) {
      for (var j = 0; j < 4; j++) {
        if (i === j) continue;
        var v4 = [0,0,0,0]; v4[i] = 1; v4[j] = -1;
        var p = proj(v4);
        var isPos = i < j;
        // simple roots: e0-e1, e1-e2, e2-e3 and their negatives
        var isSim = (Math.abs(i-j) === 1);
        roots.push({p:p, pos:isPos, simple:isSim});
      }
    }
    return roots;
  }

  // B3: 18 roots (6 short +-e_i, 12 long +-e_i+-e_j)
  function buildB3() {
    var roots = [];
    // short roots: +-e_i
    for (var i = 0; i < 3; i++) {
      var vp = [0,0,0]; vp[i] = 1;
      roots.push({p:vp, pos:true, simple:(i===0)});
      var vn = [0,0,0]; vn[i] = -1;
      roots.push({p:vn, pos:false, simple:(i===0)});
    }
    // long roots: +-e_i +- e_j (i < j)
    var signs = [[1,1],[1,-1],[-1,1],[-1,-1]];
    for (var i = 0; i < 3; i++) {
      for (var j = i+1; j < 3; j++) {
        for (var s = 0; s < 4; s++) {
          var v = [0,0,0];
          v[i] = signs[s][0]; v[j] = signs[s][1];
          // positive if first nonzero component is positive
          var firstNZ = v[0] || v[1] || v[2];
          var isPos = firstNZ > 0;
          roots.push({p:v, pos:isPos, simple:false});
        }
      }
    }
    return roots;
  }

  var systems = [
    {key:'A2', name:'A\u2082', shape:'Hexagon', roots:buildA2(),
     nPos:3, weyl:'S\u2083 (order 6)'},
    {key:'A3', name:'A\u2083', shape:'Cuboctahedron', roots:buildA3(),
     nPos:6, weyl:'S\u2084 (order 24)'},
    {key:'B3', name:'B\u2083', shape:'Cuboctahedron + Octahedron', roots:buildB3(),
     nPos:9, weyl:'(Z/2)\u00b3 \u22cb S\u2083 (order 48)'},
  ];

  // ---- Three.js setup ----
  var container = document.getElementById('viewer');
  var scene = new THREE.Scene();
  var camera = new THREE.PerspectiveCamera(45, 2, 0.1, 100);
  camera.position.set(3.2, 2.4, 3.2);
  var renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setClearColor(0x1a1a2e, 1);
  container.appendChild(renderer.domElement);
  var controls = new THREE.OrbitControls(camera, renderer.domElement);

  scene.add(new THREE.AmbientLight(0x606060, 2));
  var dl = new THREE.DirectionalLight(0xffffff, 0.6);
  dl.position.set(5, 5, 5); scene.add(dl);

  var group = new THREE.Group();
  scene.add(group);

  var COL_POS = 0xff6b6b, COL_NEG = 0x4ecdc4, COL_SIMPLE = 0xffd700;

  function showSystem(idx) {
    while (group.children.length) group.remove(group.children[0]);
    var sys = systems[idx];
    var roots = sys.roots;

    // Root vertices
    for (var i = 0; i < roots.length; i++) {
      var r = roots[i];
      var color = r.simple ? COL_SIMPLE : (r.pos ? COL_POS : COL_NEG);
      var radius = r.simple ? 0.09 : 0.065;
      var geo = new THREE.SphereGeometry(radius, 12, 12);
      var mat = new THREE.MeshPhongMaterial({color:color, emissive:color, emissiveIntensity:0.3});
      var mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(r.p[0], r.p[1], r.p[2]);
      group.add(mesh);
    }

    // Edges: connect roots at distance matching the shortest nonzero root-root distance
    // Compute all pairwise distances first to find the edge length
    var dists = [];
    for (var i = 0; i < roots.length; i++) {
      for (var j = i+1; j < roots.length; j++) {
        var dx = roots[i].p[0]-roots[j].p[0];
        var dy = roots[i].p[1]-roots[j].p[1];
        var dz = roots[i].p[2]-roots[j].p[2];
        dists.push(Math.sqrt(dx*dx+dy*dy+dz*dz));
      }
    }
    dists.sort(function(a,b){return a-b;});
    var minDist = dists[0];
    var edgeThresh = minDist * 1.05; // small tolerance

    var lineMat = new THREE.LineBasicMaterial({color:0x666688, transparent:true, opacity:0.5});
    for (var i = 0; i < roots.length; i++) {
      for (var j = i+1; j < roots.length; j++) {
        var dx = roots[i].p[0]-roots[j].p[0];
        var dy = roots[i].p[1]-roots[j].p[1];
        var dz = roots[i].p[2]-roots[j].p[2];
        var d = Math.sqrt(dx*dx+dy*dy+dz*dz);
        if (d <= edgeThresh) {
          var geo = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(roots[i].p[0],roots[i].p[1],roots[i].p[2]),
            new THREE.Vector3(roots[j].p[0],roots[j].p[1],roots[j].p[2])
          ]);
          group.add(new THREE.Line(geo, lineMat));
        }
      }
    }

    // Origin
    var og = new THREE.SphereGeometry(0.03, 8, 8);
    group.add(new THREE.Mesh(og, new THREE.MeshBasicMaterial({color:0xffffff})));

    // Axes
    var axMat = new THREE.LineBasicMaterial({color:0x333355, transparent:true, opacity:0.25});
    var ax = 2.2;
    var axPts = [[ax,0,0],[-ax,0,0],[0,ax,0],[0,-ax,0],[0,0,ax],[0,0,-ax]];
    for (var i = 0; i < axPts.length; i++) {
      var g = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(), new THREE.Vector3(axPts[i][0],axPts[i][1],axPts[i][2])
      ]);
      group.add(new THREE.Line(g, axMat));
    }

    // Update UI
    var btns = document.querySelectorAll('.btn');
    for (var i = 0; i < btns.length; i++) btns[i].classList.toggle('active', i === idx);

    document.getElementById('info').innerHTML =
      '<span class="dynkin">' + sys.name + '</span> root system \u2014 ' + sys.shape +
      ' <span class="detail">' + sys.nPos + ' positive + ' + sys.nPos + ' negative = ' +
      (sys.nPos * 2) + ' roots \u00a0|\u00a0 Weyl group: ' + sys.weyl + '</span>';
  }

  // Build selector
  var sel = document.getElementById('selector');
  for (var i = 0; i < systems.length; i++) {
    (function(idx) {
      var btn = document.createElement('button');
      btn.className = 'btn';
      btn.textContent = systems[idx].name + ' \u2014 ' + systems[idx].shape;
      btn.addEventListener('click', function() { showSystem(idx); });
      sel.appendChild(btn);
    })(i);
  }

  showSystem(1); // start with A3 cuboctahedron

  function resize() {
    var w = container.clientWidth, h = container.clientHeight;
    renderer.setSize(w, h); camera.aspect = w/h; camera.updateProjectionMatrix();
  }
  window.addEventListener('resize', resize);
  resize();

  function animate() {
    requestAnimationFrame(animate);
    group.rotation.y += 0.003;
    controls.update();
    renderer.render(scene, camera);
  }
  animate();
})();
</script>
</body>
</html>
