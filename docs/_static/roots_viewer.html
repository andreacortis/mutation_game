<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Root Systems as 3D Polytopes</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; font-family: sans-serif; color: #eee; overflow: hidden; }
  #viewer { width: 100%; height: 340px; position: relative; }
  #viewer canvas { width: 100% !important; height: 100% !important; }
  #selector {
    display: flex; justify-content: center; gap: 6px;
    padding: 8px 4px; background: #16213e; flex-wrap: wrap;
  }
  .btn {
    padding: 6px 14px; border: 2px solid #444; border-radius: 20px;
    background: transparent; color: #ccc; cursor: pointer;
    font-size: 13px; transition: all 0.2s;
  }
  .btn:hover { border-color: #888; color: #fff; }
  .btn.active { border-color: #ffd700; color: #fff; background: rgba(255,255,255,0.1); }
  #info {
    text-align: center; padding: 6px; font-size: 13px;
    background: #16213e; border-top: 1px solid #333;
  }
  #info .dynkin { color: #ffd700; font-weight: bold; font-size: 15px; }
  #info .detail { color: #aaa; font-size: 12px; }
  #legend {
    text-align: center; padding: 4px; font-size: 12px;
    background: #16213e; color: #888;
  }
</style>
</head>
<body>
<div id="selector"></div>
<div id="viewer"></div>
<div id="info"></div>
<div id="legend">
  <span style="color:#1f77b4">&#9679;</span> Node 0 &nbsp;
  <span style="color:#ff7f0e">&#9679;</span> Node 1 &nbsp;
  <span style="color:#2ca02c">&#9679;</span> Node 2 &nbsp;&nbsp;
  Edges colored by mutation index &nbsp;|&nbsp;
  Lighter = positive, Darker = negative
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
  // Minimal OrbitControls
  THREE.OrbitControls = function(camera, el) {
    var sph = new THREE.Spherical(), sphD = new THREE.Spherical();
    var rs = new THREE.Vector2(), re = new THREE.Vector2(), rd = new THREE.Vector2();
    var down = false;
    sph.setFromVector3(camera.position);
    function md(x,y){down=true;rs.set(x,y);}
    function mu(){down=false;}
    function mm(x,y){if(!down)return;re.set(x,y);rd.subVectors(re,rs);
      sphD.theta-=2*Math.PI*rd.x/el.clientHeight;
      sphD.phi-=2*Math.PI*rd.y/el.clientHeight;rs.copy(re);}
    el.addEventListener('mousedown',function(e){md(e.clientX,e.clientY);});
    el.addEventListener('mouseup',mu);el.addEventListener('mouseleave',mu);
    el.addEventListener('mousemove',function(e){mm(e.clientX,e.clientY);});
    el.addEventListener('wheel',function(e){sph.radius*=e.deltaY>0?1.1:0.9;e.preventDefault();},{passive:false});
    el.addEventListener('touchstart',function(e){if(e.touches.length===1)md(e.touches[0].clientX,e.touches[0].clientY);});
    el.addEventListener('touchend',mu);
    el.addEventListener('touchmove',function(e){if(e.touches.length===1){mm(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault();}},{passive:false});
    this.update=function(){sph.theta+=sphD.theta;sph.phi+=sphD.phi;
      sph.phi=Math.max(0.01,Math.min(Math.PI-0.01,sph.phi));sph.makeSafe();
      var o=new THREE.Vector3().setFromSpherical(sph);
      camera.position.copy(o);camera.lookAt(new THREE.Vector3());
      sphD.theta*=0.85;sphD.phi*=0.85;};
  };

  // Tab10 colors matching matplotlib (node 0, 1, 2)
  var TAB10 = [0x1f77b4, 0xff7f0e, 0x2ca02c];
  var TAB10_LIGHT = [0x6baed6, 0xffbb78, 0x74c476];  // lighter for positive
  var TAB10_DARK  = [0x08519c, 0xd94801, 0x006d2c];   // darker for negative

  // Projection from R^4 to R^3
  var sq2=Math.sqrt(2),sq6=Math.sqrt(6),sq12=Math.sqrt(12);
  var u1=[1/sq2,-1/sq2,0,0], u2=[1/sq6,1/sq6,-2/sq6,0], u3=[1/sq12,1/sq12,1/sq12,-3/sq12];
  function dot4(a,b){return a[0]*b[0]+a[1]*b[1]+a[2]*b[2]+a[3]*b[3];}
  function proj(v4){return [dot4(v4,u1),dot4(v4,u2),dot4(v4,u3)];}

  // A3 roots: e_i - e_j, with simple root and mutation edge info
  function buildA3() {
    var roots = [];
    // All 12 roots e_i - e_j
    for (var i = 0; i < 4; i++) {
      for (var j = 0; j < 4; j++) {
        if (i === j) continue;
        var v4 = [0,0,0,0]; v4[i] = 1; v4[j] = -1;
        var p = proj(v4);
        var isPos = i < j;
        // Simple root basis coords: (a,b,c) where root = a*alpha0 + b*alpha1 + c*alpha2
        // alpha0 = e0-e1, alpha1 = e1-e2, alpha2 = e2-e3
        // e_i - e_j in this basis:
        var abc = [0,0,0];
        if (i < j) { for (var k = i; k < j; k++) abc[k] = 1; }
        else { for (var k = j; k < i; k++) abc[k] = -1; }
        // Color: by the simple root with largest contribution
        var maxAbs = 0, maxIdx = 0;
        for (var k = 0; k < 3; k++) {
          if (Math.abs(abc[k]) > maxAbs) { maxAbs = Math.abs(abc[k]); maxIdx = k; }
        }
        // For simple roots themselves, use the exact index
        var isSimple = (Math.abs(i-j) === 1);
        if (isSimple) maxIdx = Math.min(i, j);
        roots.push({p:p, pos:isPos, simple:isSimple, nodeIdx:maxIdx, abc:abc, ij:[i,j]});
      }
    }

    // Mutation edges: mutation at node k connects root r to M_k @ r
    // Precompute mutation matrices
    var adj = [[0,1,0,0],[1,0,1,0],[0,1,0,1],[0,0,1,0]]; // A3 adj (in R^4 basis, but we work in simple root basis)
    // In simple root basis: M_k flips sign of component k and adds neighbors
    // M_0: (a,b,c) -> (-a+b, b, c) ... actually let's just compute from e_i-e_j directly
    var edges = [];
    var rootMap = {};
    for (var r = 0; r < roots.length; r++) {
      rootMap[roots[r].ij[0]+','+roots[r].ij[1]] = r;
    }
    // Mutation k swaps the role of basis vector k and k+1
    // s_0: swap e0,e1 -> (e_i-e_j) becomes (sigma(i)-sigma(j)) where sigma transposes 0,1
    for (var k = 0; k < 3; k++) {
      // mutation k = transposition (k, k+1) acting on indices
      for (var r = 0; r < roots.length; r++) {
        var ni = roots[r].ij[0], nj = roots[r].ij[1];
        // apply transposition (k, k+1)
        var si = ni, sj = nj;
        if (si === k) si = k+1; else if (si === k+1) si = k;
        if (sj === k) sj = k+1; else if (sj === k+1) sj = k;
        if (si === sj) continue;
        var target = rootMap[si+','+sj];
        if (target !== undefined && target > r) {
          edges.push({from: r, to: target, mutation: k});
        }
      }
    }
    return {roots: roots, edges: edges};
  }

  // B3 roots
  function buildB3() {
    var roots = [];
    var signs = [[1,1],[1,-1],[-1,1],[-1,-1]];
    // short roots: +-e_i
    for (var i = 0; i < 3; i++) {
      var vp = [0,0,0]; vp[i] = 1;
      roots.push({p:vp, pos:true, simple:(i===0), nodeIdx:i});
      var vn = [0,0,0]; vn[i] = -1;
      roots.push({p:vn, pos:false, simple:(i===0), nodeIdx:i});
    }
    // long roots: +-e_i+-e_j
    for (var i = 0; i < 3; i++) {
      for (var j = i+1; j < 3; j++) {
        for (var s = 0; s < 4; s++) {
          var v = [0,0,0]; v[i] = signs[s][0]; v[j] = signs[s][1];
          var firstNZ = v[0] || v[1] || v[2];
          roots.push({p:v, pos:firstNZ>0, simple:false, nodeIdx:i});
        }
      }
    }
    // Edges: connect nearest neighbors
    var edges = [];
    for (var i = 0; i < roots.length; i++) {
      for (var j = i+1; j < roots.length; j++) {
        var dx=roots[i].p[0]-roots[j].p[0], dy=roots[i].p[1]-roots[j].p[1], dz=roots[i].p[2]-roots[j].p[2];
        var d = Math.sqrt(dx*dx+dy*dy+dz*dz);
        if (d < 1.05) edges.push({from:i, to:j, mutation: 0});
      }
    }
    return {roots: roots, edges: edges};
  }

  var systems = [
    {key:'A3', name:'A\u2083', shape:'Cuboctahedron', data:buildA3(),
     nPos:6, weyl:'S\u2084 (order 24) \u2014 rotation group of the cube'},
    {key:'B3', name:'B\u2083', shape:'Cuboctahedron + Octahedron', data:buildB3(),
     nPos:9, weyl:'(Z/2)\u00b3 \u22cb S\u2083 (order 48) \u2014 full symmetry of the cube'},
  ];

  // Scene
  var container = document.getElementById('viewer');
  var scene = new THREE.Scene();
  var camera = new THREE.PerspectiveCamera(45, 2, 0.1, 100);
  camera.position.set(3.2, 2.4, 3.2);
  var renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setClearColor(0x1a1a2e, 1);
  container.appendChild(renderer.domElement);
  var controls = new THREE.OrbitControls(camera, renderer.domElement);

  scene.add(new THREE.AmbientLight(0x606060, 2));
  var dl = new THREE.DirectionalLight(0xffffff, 0.6);
  dl.position.set(5, 5, 5); scene.add(dl);

  var group = new THREE.Group();
  scene.add(group);

  function showSystem(idx) {
    while (group.children.length) group.remove(group.children[0]);
    var sys = systems[idx];
    var roots = sys.data.roots;
    var edges = sys.data.edges;

    // Draw root vertices
    for (var i = 0; i < roots.length; i++) {
      var r = roots[i];
      var color;
      if (r.simple) {
        color = TAB10[r.nodeIdx];
      } else if (r.pos) {
        color = TAB10_LIGHT[r.nodeIdx];
      } else {
        color = TAB10_DARK[r.nodeIdx];
      }
      var radius = r.simple ? 0.1 : 0.065;
      var geo = new THREE.SphereGeometry(radius, 12, 12);
      var mat = new THREE.MeshPhongMaterial({color:color, emissive:color, emissiveIntensity:0.2});
      var mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(r.p[0], r.p[1], r.p[2]);
      group.add(mesh);
    }

    // Draw mutation edges colored by mutation index
    for (var i = 0; i < edges.length; i++) {
      var e = edges[i];
      var rf = roots[e.from], rt = roots[e.to];
      var edgeColor = TAB10[e.mutation % 3];
      var geo = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(rf.p[0], rf.p[1], rf.p[2]),
        new THREE.Vector3(rt.p[0], rt.p[1], rt.p[2])
      ]);
      var mat = new THREE.LineBasicMaterial({color:edgeColor, transparent:true, opacity:0.6});
      group.add(new THREE.Line(geo, mat));
    }

    // Origin
    var og = new THREE.SphereGeometry(0.025, 8, 8);
    group.add(new THREE.Mesh(og, new THREE.MeshBasicMaterial({color:0xffffff})));

    // Axes
    var axMat = new THREE.LineBasicMaterial({color:0x333355, transparent:true, opacity:0.2});
    var ax = 2.2;
    var axPts = [[ax,0,0],[-ax,0,0],[0,ax,0],[0,-ax,0],[0,0,ax],[0,0,-ax]];
    for (var i = 0; i < axPts.length; i++) {
      var g = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(), new THREE.Vector3(axPts[i][0],axPts[i][1],axPts[i][2])
      ]);
      group.add(new THREE.Line(g, axMat));
    }

    // Update UI
    var btns = document.querySelectorAll('.btn');
    for (var i = 0; i < btns.length; i++) btns[i].classList.toggle('active', i === idx);

    document.getElementById('info').innerHTML =
      '<span class="dynkin">' + sys.name + '</span> root system \u2014 ' + sys.shape +
      ' <span class="detail">' + sys.nPos + ' positive + ' + sys.nPos + ' negative = ' +
      (sys.nPos * 2) + ' roots \u00a0|\u00a0 Weyl group: ' + sys.weyl + '</span>';
  }

  // Buttons
  var sel = document.getElementById('selector');
  for (var i = 0; i < systems.length; i++) {
    (function(idx) {
      var btn = document.createElement('button');
      btn.className = 'btn';
      btn.textContent = systems[idx].name + ' \u2014 ' + systems[idx].shape;
      btn.addEventListener('click', function() { showSystem(idx); });
      sel.appendChild(btn);
    })(i);
  }

  showSystem(0);

  function resize() {
    var w = container.clientWidth, h = container.clientHeight;
    renderer.setSize(w, h); camera.aspect = w/h; camera.updateProjectionMatrix();
  }
  window.addEventListener('resize', resize);
  resize();

  function animate() {
    requestAnimationFrame(animate);
    group.rotation.y += 0.003;
    controls.update();
    renderer.render(scene, camera);
  }
  animate();
})();
</script>
</body>
</html>
