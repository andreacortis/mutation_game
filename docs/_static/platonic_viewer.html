<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Platonic Solids Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; font-family: sans-serif; color: #eee; overflow: hidden; }
  #container { display: flex; flex-wrap: wrap; justify-content: center; width: 100%; }
  .solid-panel {
    width: 19%; min-width: 180px; height: 300px;
    display: inline-block; position: relative; margin: 4px;
  }
  .solid-panel canvas { width: 100% !important; height: 100% !important; }
  .label {
    position: absolute; bottom: 8px; left: 0; right: 0;
    text-align: center; font-size: 13px; pointer-events: none;
    text-shadow: 0 1px 3px #000;
  }
  .label .dynkin { color: #ffd700; font-weight: bold; }
  .label .info { color: #aaa; font-size: 11px; }
  #controls {
    text-align: center; padding: 10px; font-size: 13px; color: #888;
  }
</style>
</head>
<body>
<div id="controls">Click and drag to rotate. Scroll to zoom.</div>
<div id="container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// OrbitControls inline (minimal version)
THREE.OrbitControls = function(camera, domElement) {
  this.camera = camera;
  this.domElement = domElement;
  this.target = new THREE.Vector3();
  this.enableZoom = true;
  this.rotateSpeed = 1.0;
  var scope = this;
  var spherical = new THREE.Spherical();
  var sphericalDelta = new THREE.Spherical();
  var rotateStart = new THREE.Vector2();
  var rotateEnd = new THREE.Vector2();
  var rotateDelta = new THREE.Vector2();
  var isMouseDown = false;

  function onMouseDown(e) { isMouseDown = true; rotateStart.set(e.clientX, e.clientY); }
  function onMouseUp() { isMouseDown = false; }
  function onMouseMove(e) {
    if (!isMouseDown) return;
    rotateEnd.set(e.clientX, e.clientY);
    rotateDelta.subVectors(rotateEnd, rotateStart);
    sphericalDelta.theta -= 2 * Math.PI * rotateDelta.x / domElement.clientHeight * scope.rotateSpeed;
    sphericalDelta.phi -= 2 * Math.PI * rotateDelta.y / domElement.clientHeight * scope.rotateSpeed;
    rotateStart.copy(rotateEnd);
  }
  function onWheel(e) {
    if (!scope.enableZoom) return;
    if (e.deltaY > 0) spherical.radius *= 1.1;
    else spherical.radius *= 0.9;
    e.preventDefault();
  }
  domElement.addEventListener('mousedown', onMouseDown);
  domElement.addEventListener('mouseup', onMouseUp);
  domElement.addEventListener('mousemove', onMouseMove);
  domElement.addEventListener('wheel', onWheel, {passive: false});
  // Touch support
  domElement.addEventListener('touchstart', function(e) {
    if (e.touches.length === 1) { isMouseDown = true; rotateStart.set(e.touches[0].clientX, e.touches[0].clientY); }
  });
  domElement.addEventListener('touchend', function() { isMouseDown = false; });
  domElement.addEventListener('touchmove', function(e) {
    if (!isMouseDown || e.touches.length !== 1) return;
    rotateEnd.set(e.touches[0].clientX, e.touches[0].clientY);
    rotateDelta.subVectors(rotateEnd, rotateStart);
    sphericalDelta.theta -= 2 * Math.PI * rotateDelta.x / domElement.clientHeight * scope.rotateSpeed;
    sphericalDelta.phi -= 2 * Math.PI * rotateDelta.y / domElement.clientHeight * scope.rotateSpeed;
    rotateStart.copy(rotateEnd);
    e.preventDefault();
  }, {passive: false});

  var offset = new THREE.Vector3();
  spherical.setFromVector3(camera.position.clone().sub(scope.target));

  this.update = function() {
    spherical.theta += sphericalDelta.theta;
    spherical.phi += sphericalDelta.phi;
    spherical.phi = Math.max(0.01, Math.min(Math.PI - 0.01, spherical.phi));
    spherical.makeSafe();
    offset.setFromSpherical(spherical);
    camera.position.copy(scope.target).add(offset);
    camera.lookAt(scope.target);
    sphericalDelta.theta *= 0.85;
    sphericalDelta.phi *= 0.85;
  };
};

var solids = [
  { name: 'Tetrahedron', dynkin: 'E\u2086', vf: [3, 3], color: 0xff6b6b,
    make: function() { return new THREE.TetrahedronGeometry(1.3); } },
  { name: 'Cube', dynkin: 'E\u2087', vf: [4, 3], color: 0x4ecdc4,
    make: function() { return new THREE.BoxGeometry(1.6, 1.6, 1.6); } },
  { name: 'Octahedron', dynkin: 'E\u2087', vf: [3, 4], color: 0x45b7d1,
    make: function() { return new THREE.OctahedronGeometry(1.2); } },
  { name: 'Dodecahedron', dynkin: 'E\u2088', vf: [5, 3], color: 0xc06cd4,
    make: function() { return new THREE.DodecahedronGeometry(1.2); } },
  { name: 'Icosahedron', dynkin: 'E\u2088', vf: [3, 5], color: 0xffd93d,
    make: function() { return new THREE.IcosahedronGeometry(1.2); } },
];

var viewers = [];

solids.forEach(function(s) {
  var panel = document.createElement('div');
  panel.className = 'solid-panel';
  document.getElementById('container').appendChild(panel);

  var label = document.createElement('div');
  label.className = 'label';
  label.innerHTML = '<span class="dynkin">' + s.dynkin + '</span> ' + s.name +
    '<br><span class="info">{' + s.vf[0] + ', ' + s.vf[1] + '} &mdash; ' +
    s.vf[0] + '-gon faces, valence ' + s.vf[1] + '</span>';
  panel.appendChild(label);

  var scene = new THREE.Scene();
  var camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
  camera.position.set(2.5, 1.8, 2.5);

  var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setClearColor(0x1a1a2e, 1);
  panel.insertBefore(renderer.domElement, label);

  var controls = new THREE.OrbitControls(camera, renderer.domElement);

  // Solid face mesh
  var geo = s.make();
  var mat = new THREE.MeshPhongMaterial({
    color: s.color, transparent: true, opacity: 0.7,
    side: THREE.DoubleSide, flatShading: true
  });
  var mesh = new THREE.Mesh(geo, mat);
  scene.add(mesh);

  // Wireframe
  var wire = new THREE.LineSegments(
    new THREE.EdgesGeometry(geo),
    new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 1.5 })
  );
  scene.add(wire);

  // Vertices as small spheres
  var positions = geo.getAttribute('position');
  var seen = {};
  var sphereGeo = new THREE.SphereGeometry(0.04, 8, 8);
  var sphereMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
  for (var i = 0; i < positions.count; i++) {
    var key = [positions.getX(i).toFixed(3), positions.getY(i).toFixed(3), positions.getZ(i).toFixed(3)].join(',');
    if (!seen[key]) {
      seen[key] = true;
      var dot = new THREE.Mesh(sphereGeo, sphereMat);
      dot.position.set(positions.getX(i), positions.getY(i), positions.getZ(i));
      scene.add(dot);
    }
  }

  // Lighting
  scene.add(new THREE.AmbientLight(0x404040, 1.5));
  var light1 = new THREE.DirectionalLight(0xffffff, 0.8);
  light1.position.set(5, 5, 5);
  scene.add(light1);
  var light2 = new THREE.DirectionalLight(0xffffff, 0.4);
  light2.position.set(-3, -2, -5);
  scene.add(light2);

  viewers.push({ renderer: renderer, scene: scene, camera: camera, controls: controls, panel: panel, mesh: mesh, wire: wire });
});

function resize() {
  viewers.forEach(function(v) {
    var w = v.panel.clientWidth;
    var h = v.panel.clientHeight;
    v.renderer.setSize(w, h);
    v.camera.aspect = w / h;
    v.camera.updateProjectionMatrix();
  });
}
window.addEventListener('resize', resize);
resize();

function animate() {
  requestAnimationFrame(animate);
  viewers.forEach(function(v) {
    // slow auto-rotation
    v.mesh.rotation.y += 0.003;
    v.wire.rotation.y += 0.003;
    v.scene.children.forEach(function(c) {
      if (c.isMesh && c.geometry.type === 'SphereGeometry') c.rotation.y += 0.003;
    });
    v.controls.update();
    v.renderer.render(v.scene, v.camera);
  });
}
animate();
</script>
</body>
</html>
