<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Platonic Solids Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; font-family: sans-serif; color: #eee; overflow: hidden; }
  #viewer { width: 100%; height: 320px; position: relative; }
  #viewer canvas { width: 100% !important; height: 100% !important; }
  #selector {
    display: flex; justify-content: center; gap: 6px;
    padding: 8px 4px; background: #16213e; flex-wrap: wrap;
  }
  .btn {
    padding: 6px 14px; border: 2px solid #444; border-radius: 20px;
    background: transparent; color: #ccc; cursor: pointer;
    font-size: 13px; transition: all 0.2s;
  }
  .btn:hover { border-color: #888; color: #fff; }
  .btn.active { border-color: var(--solid-color); color: #fff; background: rgba(255,255,255,0.1); }
  #info {
    text-align: center; padding: 6px; font-size: 13px;
    background: #16213e; border-top: 1px solid #333;
  }
  #info .dynkin { color: #ffd700; font-weight: bold; font-size: 16px; }
  #info .detail { color: #aaa; font-size: 12px; }
  #hint { text-align: center; padding: 4px; font-size: 11px; color: #555; }
</style>
</head>
<body>
<div id="selector"></div>
<div id="viewer"></div>
<div id="info"></div>
<div id="hint">Click and drag to rotate. Scroll to zoom.</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// Minimal OrbitControls
THREE.OrbitControls = function(camera, domElement) {
  this.camera = camera;
  this.domElement = domElement;
  this.target = new THREE.Vector3();
  var scope = this;
  var spherical = new THREE.Spherical();
  var sphericalDelta = new THREE.Spherical();
  var rotateStart = new THREE.Vector2();
  var rotateEnd = new THREE.Vector2();
  var rotateDelta = new THREE.Vector2();
  var isDown = false;

  function onDown(x, y) { isDown = true; rotateStart.set(x, y); }
  function onUp() { isDown = false; }
  function onMove(x, y) {
    if (!isDown) return;
    rotateEnd.set(x, y);
    rotateDelta.subVectors(rotateEnd, rotateStart);
    sphericalDelta.theta -= 2 * Math.PI * rotateDelta.x / domElement.clientHeight;
    sphericalDelta.phi -= 2 * Math.PI * rotateDelta.y / domElement.clientHeight;
    rotateStart.copy(rotateEnd);
  }
  domElement.addEventListener('mousedown', function(e) { onDown(e.clientX, e.clientY); });
  domElement.addEventListener('mouseup', onUp);
  domElement.addEventListener('mouseleave', onUp);
  domElement.addEventListener('mousemove', function(e) { onMove(e.clientX, e.clientY); });
  domElement.addEventListener('wheel', function(e) {
    spherical.radius *= e.deltaY > 0 ? 1.1 : 0.9;
    e.preventDefault();
  }, {passive: false});
  domElement.addEventListener('touchstart', function(e) {
    if (e.touches.length === 1) onDown(e.touches[0].clientX, e.touches[0].clientY);
  });
  domElement.addEventListener('touchend', onUp);
  domElement.addEventListener('touchmove', function(e) {
    if (e.touches.length === 1) { onMove(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); }
  }, {passive: false});

  var offset = new THREE.Vector3();
  spherical.setFromVector3(camera.position.clone().sub(scope.target));

  this.update = function() {
    spherical.theta += sphericalDelta.theta;
    spherical.phi += sphericalDelta.phi;
    spherical.phi = Math.max(0.01, Math.min(Math.PI - 0.01, spherical.phi));
    spherical.makeSafe();
    offset.setFromSpherical(spherical);
    camera.position.copy(scope.target).add(offset);
    camera.lookAt(scope.target);
    sphericalDelta.theta *= 0.85;
    sphericalDelta.phi *= 0.85;
  };
};

var solids = [
  { name: 'Tetrahedron', dynkin: 'E\u2086', schlafli: '{3, 3}',
    V: 4, E: 6, F: 4, color: 0xff6b6b, colorCSS: '#ff6b6b',
    group: 'A\u2084 (order 12)', lie: '\ud835\udce2\ud835\udcf5(3)',
    make: function() { return new THREE.TetrahedronGeometry(1.5); } },
  { name: 'Cube', dynkin: 'E\u2087', schlafli: '{4, 3}',
    V: 8, E: 12, F: 6, color: 0x4ecdc4, colorCSS: '#4ecdc4',
    group: 'S\u2084 (order 24)', lie: '\ud835\udce2\ud835\udcf5(4)',
    make: function() { return new THREE.BoxGeometry(2, 2, 2); } },
  { name: 'Octahedron', dynkin: 'E\u2087', schlafli: '{3, 4}',
    V: 6, E: 12, F: 8, color: 0x45b7d1, colorCSS: '#45b7d1',
    group: 'S\u2084 (order 24)', lie: '\ud835\udce2\ud835\udcf5(4)',
    make: function() { return new THREE.OctahedronGeometry(1.4); } },
  { name: 'Dodecahedron', dynkin: 'E\u2088', schlafli: '{5, 3}',
    V: 20, E: 30, F: 12, color: 0xc06cd4, colorCSS: '#c06cd4',
    group: 'A\u2085 (order 60)', lie: '\ud835\udce2\ud835\udcf5(5)',
    make: function() { return new THREE.DodecahedronGeometry(1.4); } },
  { name: 'Icosahedron', dynkin: 'E\u2088', schlafli: '{3, 5}',
    V: 12, E: 30, F: 20, color: 0xffd93d, colorCSS: '#ffd93d',
    group: 'A\u2085 (order 60)', lie: '\ud835\udce2\ud835\udcf5(5)',
    make: function() { return new THREE.IcosahedronGeometry(1.4); } },
];

// Scene setup
var container = document.getElementById('viewer');
var scene = new THREE.Scene();
var camera = new THREE.PerspectiveCamera(45, 2, 0.1, 100);
camera.position.set(3, 2.2, 3);

var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x1a1a2e, 1);
container.appendChild(renderer.domElement);

var controls = new THREE.OrbitControls(camera, renderer.domElement);

// Lighting
scene.add(new THREE.AmbientLight(0x404040, 1.5));
var l1 = new THREE.DirectionalLight(0xffffff, 0.8); l1.position.set(5, 5, 5); scene.add(l1);
var l2 = new THREE.DirectionalLight(0xffffff, 0.4); l2.position.set(-3, -2, -5); scene.add(l2);

var currentGroup = new THREE.Group();
scene.add(currentGroup);

function showSolid(idx) {
  // Clear
  while (currentGroup.children.length) currentGroup.remove(currentGroup.children[0]);

  var s = solids[idx];

  // Mesh
  var geo = s.make();
  var mat = new THREE.MeshPhongMaterial({
    color: s.color, transparent: true, opacity: 0.65,
    side: THREE.DoubleSide, flatShading: true
  });
  currentGroup.add(new THREE.Mesh(geo, mat));

  // Wireframe
  currentGroup.add(new THREE.LineSegments(
    new THREE.EdgesGeometry(geo),
    new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 1.5 })
  ));

  // Vertices
  var positions = geo.getAttribute('position');
  var seen = {};
  var sg = new THREE.SphereGeometry(0.045, 8, 8);
  var sm = new THREE.MeshBasicMaterial({ color: 0xffffff });
  for (var i = 0; i < positions.count; i++) {
    var key = [positions.getX(i).toFixed(3), positions.getY(i).toFixed(3), positions.getZ(i).toFixed(3)].join(',');
    if (!seen[key]) {
      seen[key] = true;
      var dot = new THREE.Mesh(sg, sm);
      dot.position.set(positions.getX(i), positions.getY(i), positions.getZ(i));
      currentGroup.add(dot);
    }
  }

  // Update buttons
  document.querySelectorAll('.btn').forEach(function(b, i) {
    b.classList.toggle('active', i === idx);
  });

  // Update info
  document.getElementById('info').innerHTML =
    '<span class="dynkin">' + s.dynkin + '</span> &mdash; ' + s.name +
    ' &nbsp; <span class="detail">' + s.schlafli +
    ' &nbsp;|&nbsp; V=' + s.V + ' E=' + s.E + ' F=' + s.F +
    ' &nbsp;|&nbsp; Rotation group: ' + s.group + '</span>';
}

// Build selector buttons
var selectorDiv = document.getElementById('selector');
solids.forEach(function(s, i) {
  var btn = document.createElement('button');
  btn.className = 'btn';
  btn.textContent = s.name;
  btn.style.setProperty('--solid-color', s.colorCSS);
  btn.addEventListener('click', function() { showSolid(i); });
  selectorDiv.appendChild(btn);
});

// Start with tetrahedron
showSolid(0);

// Resize
function resize() {
  var w = container.clientWidth;
  var h = container.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

// Animate
function animate() {
  requestAnimationFrame(animate);
  currentGroup.rotation.y += 0.004;
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
